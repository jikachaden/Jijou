<html lang="fr">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Coloriage 🎨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Nunito:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-moments">

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="hearts-container" id="heartsContainer"></div>

    <a href="index.html" class="back-btn">← Retour</a>

    <div class="color-wrapper">

      <div class="color-header">
        <div class="welcome-tag">à toi de jouer</div>
        <h1 class="welcome-title">Colorie <span>Nymphali</span></h1>
        <p class="welcome-sub">Ta version rien qu'à toi 💕</p>
      </div>

      <!-- Toolbar -->
      <div class="color-toolbar">
        <div class="color-palette" id="colorPalette">
          <button class="color-swatch active" data-color="#f78cad" style="background:#f78cad" title="Rose"></button>
          <button class="color-swatch" data-color="#e85d75" style="background:#e85d75" title="Rose foncé"></button>
          <button class="color-swatch" data-color="#ff6b6b" style="background:#ff6b6b" title="Rouge"></button>
          <button class="color-swatch" data-color="#ffa07a" style="background:#ffa07a" title="Saumon"></button>
          <button class="color-swatch" data-color="#ffd700" style="background:#ffd700" title="Or"></button>
          <button class="color-swatch" data-color="#98d8c8" style="background:#98d8c8" title="Menthe"></button>
          <button class="color-swatch" data-color="#87ceeb" style="background:#87ceeb" title="Ciel"></button>
          <button class="color-swatch" data-color="#9b8ec4" style="background:#9b8ec4" title="Lilas"></button>
          <button class="color-swatch" data-color="#deb887" style="background:#deb887" title="Beige"></button>
          <button class="color-swatch" data-color="#f5f5dc" style="background:#f5f5dc; border-color:rgba(0,0,0,0.15)" title="Crème"></button>
          <button class="color-swatch" data-color="#a0522d" style="background:#a0522d" title="Marron"></button>
          <button class="color-swatch" data-color="#ffffff" style="background:#ffffff; border-color:rgba(0,0,0,0.15)" title="Blanc"></button>
          <button class="color-swatch" data-color="#2c2c2c" style="background:#2c2c2c" title="Noir"></button>
        </div>

        <div class="brush-sizes">
          <button class="brush-size active" data-size="4" title="Fin"><span style="width:6px;height:6px"></span></button>
          <button class="brush-size" data-size="12" title="Moyen"><span style="width:12px;height:12px"></span></button>
          <button class="brush-size" data-size="24" title="Large"><span style="width:22px;height:22px"></span></button>
        </div>

        <div class="color-actions">
          <button class="color-action-btn" id="fillBtn" title="Remplissage">🪣</button>
          <button class="color-action-btn" id="eraserBtn" title="Gomme">🧹</button>
          <button class="color-action-btn" id="clearBtn" title="Tout effacer">🗑️</button>
        </div>
      </div>

      <!-- Zone de dessin -->
      <div class="canvas-zone" id="canvasZone">
        <canvas id="drawCanvas"></canvas>
      </div>

      <!-- Popup de félicitations -->
      <div class="color-win-overlay" id="colorWinOverlay" onclick="closeColorWin(event)">
        <div class="notif-popup color-win-popup" id="colorWinPopup">
          <button class="notif-close" onclick="closeColorWin(event, true)">✕</button>
          <div class="notif-popup-icon">🎨</div>
          <div class="notif-popup-body">
            <p>Tu as quasiment fini ton premier coloriage !</p>
            <p>Pour te féliciter, tu as gagné le droit de gratter un ticket dans la section Cash 🎰</p>
            <p class="notif-ps">Je t'aime mon amour 💖</p>
          </div>
          <a href="cash.html" class="game-btn" style="text-decoration:none; margin-top:8px;">Aller gratter 🎰</a>
        </div>
      </div>

    </div>

    <p class="footer-text" style="position:relative; z-index:2; margin-top:40px;">fait avec amour ♡</p>
  </div>

  <script src="script.js"></script>
  <script>
  /* ═══════════════════════════════════════════════════════
     COLORIAGE — Canvas interactif + Flood Fill
     ═══════════════════════════════════════════════════════ */

  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const canvasZone = document.getElementById('canvasZone');

  let drawing = false;
  let currentColor = '#f78cad';
  let brushSize = 4;
  let isEraser = false;
  let isFill = false;
  let lastX = 0, lastY = 0;

  /* ─── Charger l'image directement dans le canvas ─── */
  const bgImg = new Image();
  bgImg.src = 'nymphali-coloriage.png';

  function initCanvas() {
    const rect = canvasZone.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;
    canvas.width = w;
    canvas.height = h;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Dessiner fond blanc + image
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);

    // Centrer l'image dans le canvas
    const imgRatio = bgImg.naturalWidth / bgImg.naturalHeight;
    const canvasRatio = w / h;
    let drawW, drawH, offsetX, offsetY;

    if (imgRatio > canvasRatio) {
      drawW = w * 0.9;
      drawH = drawW / imgRatio;
    } else {
      drawH = h * 0.9;
      drawW = drawH * imgRatio;
    }
    offsetX = (w - drawW) / 2;
    offsetY = (h - drawH) / 2;

    ctx.drawImage(bgImg, offsetX, offsetY, drawW, drawH);
  }

  bgImg.onload = initCanvas;

  /* ─── Coords ─── */
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    if (e.touches) return { x: (e.touches[0].clientX - rect.left) * sx, y: (e.touches[0].clientY - rect.top) * sy };
    return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
  }

  /* ─── Dessin ─── */
  function startDraw(e) {
    e.preventDefault();
    const pos = getPos(e);

    // Mode remplissage
    if (isFill) {
      floodFill(Math.round(pos.x), Math.round(pos.y), currentColor);
      return;
    }

    drawing = true;
    lastX = pos.x; lastY = pos.y;
    ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, brushSize / 2, 0, Math.PI * 2);
    ctx.fillStyle = isEraser ? 'rgba(0,0,0,1)' : currentColor;
    ctx.fill();
  }

  function draw(e) {
    if (!drawing || isFill) return;
    e.preventDefault();
    const pos = getPos(e);

    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.lineWidth = brushSize;
    ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
    ctx.strokeStyle = isEraser ? 'rgba(0,0,0,1)' : currentColor;
    ctx.stroke();
    lastX = pos.x; lastY = pos.y;
  }

  function stopDraw() { drawing = false; }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', stopDraw);
  canvas.addEventListener('touchcancel', stopDraw);

  /* ═══════════════════════════════════════
     FLOOD FILL — Remplissage par zone
     ═══════════════════════════════════════ */
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return [r, g, b, 255];
  }

  function colorMatch(a, b, tolerance) {
    return Math.abs(a[0] - b[0]) <= tolerance &&
           Math.abs(a[1] - b[1]) <= tolerance &&
           Math.abs(a[2] - b[2]) <= tolerance &&
           Math.abs(a[3] - b[3]) <= tolerance;
  }

  function floodFill(startX, startY, hexColor) {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const w = canvas.width;
    const h = canvas.height;
    const fillColor = hexToRgb(hexColor);
    const tolerance = 30;

    // Couleur du pixel de départ
    const startIdx = (startY * w + startX) * 4;
    const targetColor = [data[startIdx], data[startIdx + 1], data[startIdx + 2], data[startIdx + 3]];

    // Si la couleur cible = couleur de remplissage, on arrête
    if (colorMatch(targetColor, fillColor, 5)) return;

    // Ne pas remplir sur les contours noirs
    if (targetColor[0] < 50 && targetColor[1] < 50 && targetColor[2] < 50) return;

    const stack = [[startX, startY]];
    const visited = new Uint8Array(w * h);

    while (stack.length > 0) {
      const [x, y] = stack.pop();

      if (x < 0 || x >= w || y < 0 || y >= h) continue;

      const pixelIdx = y * w + x;
      if (visited[pixelIdx]) continue;
      visited[pixelIdx] = 1;

      const idx = pixelIdx * 4;
      const pixelColor = [data[idx], data[idx + 1], data[idx + 2], data[idx + 3]];

      if (!colorMatch(pixelColor, targetColor, tolerance)) continue;

      // Remplir le pixel
      data[idx] = fillColor[0];
      data[idx + 1] = fillColor[1];
      data[idx + 2] = fillColor[2];
      data[idx + 3] = fillColor[3];

      // Ajouter les voisins
      stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
    }

    ctx.putImageData(imageData, 0, 0);
  }

  /* ─── Palette ─── */
  function clearAllTools() {
    isEraser = false;
    isFill = false;
    document.getElementById('eraserBtn').classList.remove('action-active');
    document.getElementById('fillBtn').classList.remove('action-active');
    canvas.classList.remove('eraser-cursor', 'fill-cursor');
  }

  document.querySelectorAll('.color-swatch').forEach(s => {
    s.addEventListener('click', () => {
      document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      currentColor = s.dataset.color;
      clearAllTools();
    });
  });

  /* ─── Brush size ─── */
  document.querySelectorAll('.brush-size').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.brush-size').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      brushSize = parseInt(b.dataset.size);
      clearAllTools();
    });
  });

  /* ─── Fill bucket ─── */
  document.getElementById('fillBtn').addEventListener('click', () => {
    isFill = !isFill;
    if (isFill) isEraser = false;
    document.getElementById('fillBtn').classList.toggle('action-active', isFill);
    document.getElementById('eraserBtn').classList.remove('action-active');
    canvas.classList.toggle('fill-cursor', isFill);
    canvas.classList.remove('eraser-cursor');
  });

  /* ─── Eraser ─── */
  document.getElementById('eraserBtn').addEventListener('click', () => {
    isEraser = !isEraser;
    if (isEraser) isFill = false;
    document.getElementById('eraserBtn').classList.toggle('action-active', isEraser);
    document.getElementById('fillBtn').classList.remove('action-active');
    canvas.classList.toggle('eraser-cursor', isEraser);
    canvas.classList.remove('fill-cursor');
  });

  /* ─── Clear ─── */
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (confirm('Tout effacer ? 🧹')) initCanvas();
  });

  if (bgImg.complete) initCanvas();

  /* ═══════════════════════════════════════
     DÉTECTION COLORIAGE TERMINÉ
     ═══════════════════════════════════════ */
  let coloringComplete = false;

  function checkCompletion() {
    if (coloringComplete) return;

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    let whitePixels = 0;
    let nonBlackPixels = 0;

    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i + 1], b = data[i + 2];

      // Ignorer les pixels noirs (contours) — ils font pas partie du coloriage
      if (r < 60 && g < 60 && b < 60) continue;

      nonBlackPixels++;

      // Compter les pixels blancs ou quasi-blancs
      if (r > 235 && g > 235 && b > 235) {
        whitePixels++;
      }
    }

    // Pourcentage de blanc parmi les zones non-contours
    const whitePct = nonBlackPixels > 0 ? whitePixels / nonBlackPixels : 1;

    // Moins de 5% de blanc parmi les zones coloriables = terminé
    if (whitePct < 0.05) {
      coloringComplete = true;
      setTimeout(() => triggerColorWin(), 500);
    }
  }

  // Vérifier après chaque action (dessin ou fill)
  canvas.addEventListener('mouseup', () => setTimeout(checkCompletion, 300));
  canvas.addEventListener('touchend', () => setTimeout(checkCompletion, 300));

  function triggerColorWin() {
    document.getElementById('colorWinOverlay').classList.add('active');

    // Confettis
    const wrapper = document.querySelector('.color-wrapper');
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        const c = document.createElement('span');
        c.className = 'confetti';
        c.textContent = ['🎨','💖','✨','🌸','💕','🎉','🩷','🖌️'][Math.floor(Math.random()*8)];
        c.style.left = Math.random() * 100 + '%';
        c.style.setProperty('--fall-duration', (2 + Math.random() * 3) + 's');
        c.style.setProperty('--sway', (Math.random() > 0.5 ? '' : '-') + (20 + Math.random()*60) + 'px');
        wrapper.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }, i * 80);
    }
  }

  function closeColorWin(e, forceClose) {
    const overlay = document.getElementById('colorWinOverlay');
    if (forceClose || e.target === overlay) {
      overlay.classList.remove('active');
    }
  }
  </script>
</body>
</html>
