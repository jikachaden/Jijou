<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q77GT18JP9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Q77GT18JP9');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nos moments 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Nunito:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 
       PAGE — NOS MOMENTS (Timeline)
        -->
  <div class="page-moments">

    <!-- Orbes lumineuses -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Coeurs flottants -->
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- Bouton retour -->
    <a href="index.html" class="back-btn">← Retour</a>


    <!-- 
         EN-TÊTE DE PAGE
          -->
    <section class="timeline-hero">
      <div class="moments-header">
        <div class="welcome-tag">notre histoire</div>
        <h1 class="welcome-title">
          Nos <span>moments</span>
        </h1>
        <p class="welcome-sub timeline-intro">Scrolle pour revivre nos souvenirs ↓</p>
      </div>
    </section>


    <!-- 
         LIGNE DU TEMPS — Fil vertical
         -->
    <div class="timeline">


      <!-- 
           BLOC 0 — Notre plus belle photo
            -->
      <div class="memory-block memory-reveal" data-side="right">

        <!-- Déco latérale — Cinnamoroll à gauche -->
        <div class="moments-img moments-img-cinnamoroll">
          <div class="image-showcase">
            <div class="image-ring"></div>
            <div class="image-frame">
              <img src="cinnamoroll.png" alt="Cinnamoroll 💕">
            </div>
          </div>
        </div>

        <div class="timeline-dot-marker"></div>

        <div class="memory-content">
          <div class="memory-date">Notre plus belle photo</div>
          <div class="memory-divider"></div>

          <div class="best-photo-showcase">
            <div class="image-showcase">
              <div class="image-ring"></div>
              <div class="image-frame best-photo-frame">
                <img src="IMG_1659.PNG" alt="Notre plus belle photo 💕">
              </div>
            </div>
          </div>
        </div>
      </div>


      <!-- Séparateur doux -->
      <div class="timeline-separator">
        <span class="separator-icon">✦</span>
      </div>


      <!-- 
           BLOC 1 — Notre première date
            -->
      <div class="memory-block memory-reveal" data-side="left">

        <!-- Déco latérales (Victini & HelloKitty) -->
        <div class="moments-img moments-img-victini">
          <div class="image-showcase">
            <div class="image-ring"></div>
            <div class="image-frame">
              <img src="Victini.png" alt="Notre moment 🌸">
            </div>
          </div>
        </div>
        <div class="moments-img moments-img-hellokitty">
          <div class="image-showcase">
            <div class="image-ring"></div>
            <div class="image-frame">
              <img src="HelloKitty.png" alt="Notre moment 💕">
            </div>
          </div>
        </div>
        <div class="moments-img moments-img-melody">
          <div class="image-showcase">
            <div class="image-ring"></div>
            <div class="image-frame">
              <img src="Melody.png" alt="Notre moment 💕">
            </div>
          </div>
        </div>
        <div class="moments-img moments-img-maomao">
          <div class="image-showcase">
            <div class="image-ring"></div>
            <div class="image-frame">
              <img src="maomao2.webp" alt="Notre moment 💕">
            </div>
          </div>
        </div>
        <div class="moments-img moments-img-nymphali">
          <div class="image-showcase">
            <div class="image-ring"></div>
            <div class="image-frame">
              <img src="nymphali.png" alt="Notre moment 💕">
            </div>
          </div>
        </div>

        <!-- Point sur la timeline -->
        <div class="timeline-dot-marker"></div>

        <!-- Contenu -->
        <div class="memory-content">
          <div class="memory-date">Chapitre 1</div>
          <h2 class="memory-title"></h2>
          <div class="memory-divider"></div>

          <!-- Carrousel coverflow -->
          <div class="coverflow-wrapper">
            <button class="coverflow-nav coverflow-prev" aria-label="Précédent">❮</button>
            <div class="coverflow-viewport">
              <div class="coverflow-track">
                <div class="coverflow-item"><img src="date13.JPG" alt="Souvenir"></div>
                <div class="coverflow-item"><img src="date11.jpeg" alt="Souvenir"></div>
                <div class="coverflow-item"><img src="date14.JPG" alt="Souvenir"></div>
                <div class="coverflow-item"><img src="date12.jpeg" alt="Souvenir"></div>

              </div>
            </div>
            <button class="coverflow-nav coverflow-next" aria-label="Suivant">❯</button>
            <div class="coverflow-dots"></div>
          </div>
        </div>
      </div>


      <!-- Séparateur doux -->
      <div class="timeline-separator">
        <span class="separator-icon">✦</span>
      </div>


      <!-- 
           BLOC 2 — Souvenirs gravés
           -->
      <div class="memory-block memory-reveal" data-side="right">
        <div class="timeline-dot-marker"></div>

        <div class="memory-content">
          <div class="memory-date-alt">
            <span class="date-line"></span>
          
            <span class="date-line"></span>
          </div>
          <h2 class="memory-title memory-title-emotional">Chapitre 2</h2>
          <p class="memory-subtitle"></p>
          <div class="memory-divider"></div>

          <div class="coverflow-wrapper">
            <button class="coverflow-nav coverflow-prev" aria-label="Précédent">❮</button>
            <div class="coverflow-viewport">
              <div class="coverflow-track">
                <div class="coverflow-item"><img src="date21.JPG" alt="Souvenir"></div>
                <div class="coverflow-item"><img src="date22.JPG" alt="Souvenir"></div>
                <div class="coverflow-item"><img src="date23.JPG" alt="Souvenir"></div>
              </div>
            </div>
            <button class="coverflow-nav coverflow-next" aria-label="Suivant">❯</button>
            <div class="coverflow-dots"></div>
          </div>
        </div>
      </div>


      <!-- Séparateur doux -->
      <div class="timeline-separator">
        <span class="separator-icon">♡</span>
      </div>


      <!-- 
           BLOC 3 — Chapitre 3
            -->
      <div class="memory-block memory-reveal" data-side="left">
        <div class="timeline-dot-marker"></div>

        <div class="memory-content">
          <div class="memory-date">Juste nouuuuus</div>
          <h2 class="memory-title">Encore un chapitre de nous</h2>
          <div class="memory-divider"></div>

          <div class="coverflow-wrapper">
            <button class="coverflow-nav coverflow-prev" aria-label="Précédent">❮</button>
            <div class="coverflow-viewport">
              <div class="coverflow-track">
                <div class="coverflow-item"><img src="nous1.jpeg" alt="Souvenir"></div>
                <div class="coverflow-item"><img src="nous4.JPG" alt="Souvenir"></div>
                <div class="coverflow-item"><img src="nous2.JPG" alt="Souvenir"></div>
                <div class="coverflow-item"><img src="nous7.jpeg" alt="Souvenir"></div>
                <div class="coverflow-item"><img src="nous 5.jpeg" alt="Souvenir"></div>
                <div class="coverflow-item"><img src="nous 6.JPG" alt="Souvenir"></div>
              </div>
            </div>
            <button class="coverflow-nav coverflow-next" aria-label="Suivant">❯</button>
            <div class="coverflow-dots"></div>
          </div>
        </div>
      </div>


    </div><!-- /.timeline -->


    <!-- 
         MESSAGE FINAL
         -->
    <section class="timeline-footer memory-reveal">
      <div class="memory-divider"></div>
      <p class="timeline-end-text">
        Notre histoire continue de s'écrire…
      </p>
      <p class="footer-text"></p>
    </section>

  </div><!-- /.page-moments -->

  <script src="script.js"></script>
</body>
</html>
