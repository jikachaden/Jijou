<html lang="fr">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Un secret 💌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Nunito:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-moments">

    <!-- Décor ambiant -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="hearts-container" id="heartsContainer"></div>

    <a href="index.html" class="back-btn">← Retour</a>

    <!-- 
         UN SECRET — Lettre interactive
     -->
    <div class="secret-wrapper">

      <!-- Enveloppe géante -->
      <div class="envelope" id="envelope">
        <div class="envelope-flap"></div>
        <div class="envelope-body">
          <div class="envelope-icon">💌</div>
          <p class="envelope-text">Tu as reçu une lettre…</p>
          <button class="game-btn" id="openLetterBtn">Ouvrir 💕</button>
        </div>
      </div>

      <!-- Lettre révélée -->
      <div class="letter" id="letter">
        <div class="letter-paper">

          <div class="letter-header">
            <span class="letter-tag">Pour toi, ma Jiji 💕</span>
          </div>

          <div class="letter-body" id="letterBody">
            <!-- Les mots apparaissent ici un par un -->
          </div>

          <div class="letter-hint" id="letterHint">
            <span>Clique n'importe où pour lire la suite ✦</span>
          </div>

          <div class="letter-signature" id="letterSignature">
            — Jawad ♡
          </div>

        </div>
      </div>

    </div>

    <p class="footer-text" style="position:relative; z-index:2; margin-top:40px;"></p>
  </div>

  <script src="script.js"></script>
  <script>
  /* 
     UN SECRET — Lettre mot par mot
   */

  const LETTER_PARTS = [
    "Tu n'imagines pas",
    "à quel point",
    "tu rends ma vie",
    "plus belle.",
    "Merci pour ta douceur,",
    "ton rire,",
    "ta patience,",
    "et tout ce que tu es.",
    "Je t'aime très fort",
  ];

  const envelope = document.getElementById('envelope');
  const letter = document.getElementById('letter');
  const letterBody = document.getElementById('letterBody');
  const letterHint = document.getElementById('letterHint');
  const letterSignature = document.getElementById('letterSignature');
  const openBtn = document.getElementById('openLetterBtn');

  let partIndex = 0;
  let letterOpen = false;
  let letterComplete = false;

  /* Ouvrir l'enveloppe */
  openBtn.addEventListener('click', () => {
    envelope.classList.add('envelope-opened');
    setTimeout(() => {
      envelope.style.display = 'none';
      letter.classList.add('letter-visible');
      letterOpen = true;
    }, 700);
  });

  /*  Clic pour révéler le mot suivant */
  document.addEventListener('click', (e) => {
    if (!letterOpen || letterComplete) return;
    // Ignorer les clics sur le bouton retour
    if (e.target.closest('.back-btn')) return;

    if (partIndex < LETTER_PARTS.length) {
      const span = document.createElement('span');
      span.className = 'letter-word';
      span.textContent = LETTER_PARTS[partIndex] + ' ';
      letterBody.appendChild(span);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => span.classList.add('visible'));
      });

      partIndex++;

      // Dernier mot → montrer signature + confettis
      if (partIndex >= LETTER_PARTS.length) {
        letterComplete = true;
        letterHint.classList.add('hidden');

        setTimeout(() => {
          letterSignature.classList.add('visible');
          launchLetterConfetti();
        }, 600);
      }
    }
  });

  /* ─── Confettis finaux ─── */
  function launchLetterConfetti() {
    const wrapper = document.querySelector('.secret-wrapper');
    for (let i = 0; i < 25; i++) {
      setTimeout(() => {
        const c = document.createElement('span');
        c.className = 'confetti';
        c.textContent = ['💖','💕','✨','🌸','♡','💗','🩷'][Math.floor(Math.random()*7)];
        c.style.left = Math.random() * 100 + '%';
        c.style.setProperty('--fall-duration', (2 + Math.random() * 3) + 's');
        c.style.setProperty('--sway', (Math.random() > 0.5 ? '' : '-') + (20 + Math.random()*60) + 'px');
        wrapper.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }, i * 100);
    }
  }
  </script>
</body>
</html>
